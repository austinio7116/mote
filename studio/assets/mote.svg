<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Mote — a speck of light caught in a sunbeam -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1f30"/>
      <stop offset="1" stop-color="#0b0d16"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.00" stop-color="#ffe6a0" stop-opacity="0"/>
      <stop offset="0.50" stop-color="#ffd779" stop-opacity="0.50"/>
      <stop offset="1.00" stop-color="#ffe6a0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff0c0" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffd779" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#fff6da"/>
      <stop offset="1.0" stop-color="#ffdd86" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- the sunbeam: a soft diagonal shaft -->
  <g clip-path="inset(0 round 116)">
    <g transform="rotate(24 256 256)">
      <rect x="188" y="-80" width="136" height="672" fill="url(#beam)"/>
      <rect x="236" y="-80" width="40"  height="672" fill="url(#beam)" opacity="0.5"/>
    </g>
  </g>

  <!-- drifting dust specks in the beam -->
  <circle cx="206" cy="150" r="4.5" fill="#ffe6a0" opacity="0.55"/>
  <circle cx="318" cy="206" r="3"   fill="#ffe6a0" opacity="0.40"/>
  <circle cx="196" cy="330" r="3.5" fill="#ffe6a0" opacity="0.45"/>
  <circle cx="332" cy="372" r="5"   fill="#ffe6a0" opacity="0.45"/>

  <!-- the mote -->
  <circle cx="262" cy="266" r="150" fill="url(#halo)"/>
  <circle cx="262" cy="266" r="58"  fill="url(#core)"/>
  <circle cx="262" cy="266" r="17"  fill="#ffffff"/>
</svg>
