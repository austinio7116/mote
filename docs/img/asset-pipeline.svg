<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg" font-family="'DejaVu Sans','Segoe UI',sans-serif">
  <rect width="1000" height="300" rx="14" fill="#0e1018"/>
  <text x="40" y="44" fill="#ebd28c" font-size="22" font-weight="700">Baking: assets become C the game compiles in</text>
  <text x="40" y="70" fill="#9aa3b6" font-size="14">the device has no filesystem — so an image/mesh is converted to a header you #include and use directly</text>
  <rect x="40" y="110" width="200" height="100" rx="10" fill="#172230" stroke="#3f5170"/>
  <text x="140" y="150" fill="#9ec2f0" font-size="15" font-weight="700" text-anchor="middle">assets/logo.png</text>
  <text x="140" y="174" fill="#6f7c95" font-size="12.5" text-anchor="middle">104 × 30, RGBA</text>
  <line x1="248" y1="160" x2="350" y2="160" stroke="#ebd28c" stroke-width="2.5" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10z" fill="#ebd28c"/></marker></defs>
  <text x="300" y="150" fill="#cdb985" font-size="12.5" text-anchor="middle">bake</text>
  <text x="300" y="178" fill="#6f7c95" font-size="11" text-anchor="middle">img2tex</text>
  <rect x="360" y="96" width="600" height="170" rx="10" fill="#13202a" stroke="#46535f"/>
  <text x="380" y="124" fill="#9be0c0" font-size="14" font-weight="700">src/logo.h  (generated)</text>
  <g font-family="monospace" font-size="14" fill="#d7dded">
    <text x="380" y="152">static const uint16_t logo_px[3120] = { ... };   <tspan fill="#6f7c95">// RGB565 pixels</tspan></text>
    <text x="380" y="178">static const MoteImage logo_img =</text>
    <text x="400" y="200">{ logo_px, 104, 30, 0xF81F };                <tspan fill="#6f7c95">// the struct you draw</tspan></text>
    <text x="380" y="226">#define logo_W 104     #define logo_H 30</text>
  </g>
  <text x="40" y="290" fill="#6f7c95" font-size="13">Studio Pixel-Art ▸ Save auto-bakes; CLI: run `mote bake` (build/run do NOT auto-bake). Audio is NOT baked.</text>
</svg>
