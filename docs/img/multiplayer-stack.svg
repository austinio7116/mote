<svg width="880" height="392" viewBox="0 0 880 392" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
  <defs>
    <marker id="sg" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#37d67a"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="879" height="391" rx="14" fill="#0b0d12" stroke="#1c2130"/>
  <text x="24" y="32" fill="#f5cd46" font-size="20" font-weight="700">The multiplayer stack &#8212; one call, then bytes</text>
  <text x="24" y="53" fill="#8b93a8" font-size="12.5">net_lobby() hands back a clean connected pipe; from there it is raw bytes, identical on every transport</text>

  <!-- YOUR GAME -->
  <rect x="40" y="70" width="780" height="56" rx="10" fill="#1e1a33" stroke="#7c5cff" stroke-width="1.5"/>
  <text x="58" y="92" fill="#b9a7ff" font-size="12" font-weight="700" letter-spacing="1">YOUR GAME</text>
  <text x="58" y="112" fill="#dfe4f0" font-size="12" font-family="'SF Mono','Cascadia Code',Consolas,monospace">mote-&gt;net_lobby(&amp;cfg, &amp;host)  &#8594;  then plain link_send() / link_recv()</text>
  <text x="802" y="103" fill="#8b93a8" font-size="10.5" text-anchor="end">framed messages over a byte stream</text>

  <line x1="430" y1="128" x2="430" y2="140" stroke="#37d67a" stroke-width="1.8" marker-end="url(#sg)"/>

  <!-- ENGINE LOBBY -->
  <rect x="40" y="144" width="780" height="56" rx="10" fill="#12151d" stroke="#2a3147" stroke-width="1.4"/>
  <text x="58" y="166" fill="#dfe4f0" font-size="12" font-weight="700" letter-spacing="1">ENGINE LOBBY &#8212; net_lobby()</text>
  <text x="58" y="186" fill="#8b93a8" font-size="11.5">transport picker &#183; rooms via the docked Studio (MN1 control protocol) &#183; ML handshake &#8594; clean pipe + host flag</text>

  <line x1="430" y1="202" x2="430" y2="214" stroke="#37d67a" stroke-width="1.8" marker-end="url(#sg)"/>

  <!-- LINK HEALTH -->
  <rect x="40" y="218" width="780" height="56" rx="10" fill="#12151d" stroke="#2a3147" stroke-width="1.4"/>
  <text x="58" y="240" fill="#dfe4f0" font-size="12" font-weight="700" letter-spacing="1">LINK HEALTH</text>
  <text x="58" y="260" fill="#8b93a8" font-size="11.5">engine keepalives every session &#183; short blips &#8594; LINK STALLED banner, match survives &#183; real outage (&gt;20 s) &#8594; LOST</text>

  <line x1="430" y1="276" x2="430" y2="288" stroke="#37d67a" stroke-width="1.8" marker-end="url(#sg)"/>

  <!-- TRANSPORTS -->
  <rect x="40" y="292" width="249" height="56" rx="10" fill="#101720" stroke="#2a3147" stroke-width="1.4"/>
  <text x="164" y="315" fill="#dfe4f0" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1">USB CABLE</text>
  <text x="164" y="334" fill="#8b93a8" font-size="10.5" text-anchor="middle">device &#8596; device, dual-role CDC</text>

  <rect x="305" y="292" width="249" height="56" rx="10" fill="#101720" stroke="#2a3147" stroke-width="1.4"/>
  <text x="429" y="315" fill="#dfe4f0" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1">LAN</text>
  <text x="429" y="334" fill="#8b93a8" font-size="10.5" text-anchor="middle">Studio &#8596; Studio, tcp 42450 broadcast</text>

  <rect x="570" y="292" width="249" height="56" rx="10" fill="#101720" stroke="#2a3147" stroke-width="1.4"/>
  <text x="694" y="315" fill="#dfe4f0" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1">INTERNET</text>
  <text x="694" y="334" fill="#8b93a8" font-size="10.5" text-anchor="middle">Studio &#8594; relay &#8592; Studio, rooms by code</text>

  <!-- engine-owned bracket -->
  <path d="M830 144 h6 v204 h-6" fill="none" stroke="#3a4258" stroke-width="1.2"/>
  <text x="852" y="246" fill="#8b93a8" font-size="9.5" letter-spacing="2" text-anchor="middle" transform="rotate(90 852 246)">ENGINE-OWNED</text>

  <text x="430" y="375" fill="#37d67a" font-size="12.5" font-weight="600" text-anchor="middle">same game code, every transport &#8212; one raw byte pipe</text>
</svg>
