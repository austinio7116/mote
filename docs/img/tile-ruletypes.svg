<svg width="1000" height="360" viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg" font-family="'DejaVu Sans','Segoe UI',sans-serif">
  <rect width="1000" height="360" rx="14" fill="#0e1018"/>
  <text x="40" y="40" fill="#ebd28c" font-size="22" font-weight="700">The four rule types</text>
  <text x="40" y="64" fill="#9aa3b6" font-size="14">the rule type is the sheet layout the LUT expects — it sets how many tiles you draw and which neighbours are read</text>

  <!-- ===== Blob 47 ===== -->
  <rect x="40" y="84" width="218" height="250" rx="8" fill="#11151d" stroke="#2a3240"/>
  <text x="56" y="110" fill="#bcd3f3" font-size="16" font-weight="700">Blob 47</text>
  <text x="56" y="128" fill="#e6c87a" font-size="12">47 tiles · all 8 neighbours</text>
  <!-- inner concave corner visual -->
  <g transform="translate(56,140)">
    <rect x="0" y="0" width="26" height="26" fill="#2f6f4e"/><rect x="27" y="0" width="26" height="26" fill="#2f6f4e"/><rect x="54" y="0" width="26" height="26" fill="#1a1e28" stroke="#2a3240"/>
    <rect x="0" y="27" width="26" height="26" fill="#2f6f4e"/><rect x="27" y="27" width="26" height="26" fill="#ebd28c"/><rect x="54" y="27" width="26" height="26" fill="#2f6f4e"/>
    <rect x="0" y="54" width="26" height="26" fill="#2f6f4e"/><rect x="27" y="54" width="26" height="26" fill="#2f6f4e"/><rect x="54" y="54" width="26" height="26" fill="#2f6f4e"/>
  </g>
  <text x="146" y="170" fill="#9fb0cc" font-size="11">corner-aware:</text>
  <text x="146" y="186" fill="#9fb0cc" font-size="11">notices the one</text>
  <text x="146" y="202" fill="#9fb0cc" font-size="11">empty diagonal →</text>
  <text x="146" y="218" fill="#9fb0cc" font-size="11">a notched corner</text>
  <text x="56" y="252" fill="#a9e0c2" font-size="12" font-weight="700">best: organic terrain</text>
  <text x="56" y="270" fill="#79b196" font-size="11.5">caves, water, cliffs,</text>
  <text x="56" y="285" fill="#79b196" font-size="11.5">grass / sand blobs</text>
  <text x="56" y="308" fill="#d99" font-size="11.5">limit: 47 tiles to draw</text>
  <text x="56" y="323" fill="#c88" font-size="11.5">(use transforms to cut it)</text>

  <!-- ===== Edge 16 ===== -->
  <rect x="270" y="84" width="218" height="250" rx="8" fill="#11151d" stroke="#2a3240"/>
  <text x="286" y="110" fill="#bcd3f3" font-size="16" font-weight="700">Edge 16</text>
  <text x="286" y="128" fill="#e6c87a" font-size="12">16 tiles · N/E/S/W only</text>
  <!-- cardinal cross visual -->
  <g transform="translate(286,140)">
    <rect x="27" y="0" width="26" height="26" fill="#2f6f4e"/><text x="40" y="18" fill="#0e1018" font-size="12" text-anchor="middle">N</text>
    <rect x="0" y="27" width="26" height="26" fill="#2f6f4e"/><text x="13" y="45" fill="#0e1018" font-size="12" text-anchor="middle">W</text>
    <rect x="27" y="27" width="26" height="26" fill="#ebd28c"/>
    <rect x="54" y="27" width="26" height="26" fill="#2f6f4e"/><text x="67" y="45" fill="#0e1018" font-size="12" text-anchor="middle">E</text>
    <rect x="27" y="54" width="26" height="26" fill="#2f6f4e"/><text x="40" y="72" fill="#0e1018" font-size="12" text-anchor="middle">S</text>
    <rect x="0" y="0" width="26" height="26" fill="#1a1e28" stroke="#2a3240"/><rect x="54" y="0" width="26" height="26" fill="#1a1e28" stroke="#2a3240"/>
    <rect x="0" y="54" width="26" height="26" fill="#1a1e28" stroke="#2a3240"/><rect x="54" y="54" width="26" height="26" fill="#1a1e28" stroke="#2a3240"/>
  </g>
  <text x="376" y="174" fill="#9fb0cc" font-size="11">mask =</text>
  <text x="376" y="190" fill="#9fb0cc" font-size="11">N|E&lt;&lt;1|</text>
  <text x="376" y="206" fill="#9fb0cc" font-size="11">S&lt;&lt;2|W&lt;&lt;3</text>
  <text x="286" y="252" fill="#a9e0c2" font-size="12" font-weight="700">best: blocky / retro</text>
  <text x="286" y="270" fill="#79b196" font-size="11.5">platforms, pipes,</text>
  <text x="286" y="285" fill="#79b196" font-size="11.5">Mario-style walls</text>
  <text x="286" y="308" fill="#d99" font-size="11.5">limit: no corner sense —</text>
  <text x="286" y="323" fill="#c88" font-size="11.5">concave corners look square</text>

  <!-- ===== Nine-slice ===== -->
  <rect x="500" y="84" width="218" height="250" rx="8" fill="#11151d" stroke="#2a3240"/>
  <text x="516" y="110" fill="#bcd3f3" font-size="16" font-weight="700">Nine-slice</text>
  <text x="516" y="128" fill="#e6c87a" font-size="12">9 tiles · a 3×3 frame</text>
  <g transform="translate(516,140)" font-size="10" text-anchor="middle">
    <rect x="0" y="0" width="26" height="26" fill="#1d3050"/><text x="13" y="17" fill="#bcd3f3">TL</text>
    <rect x="27" y="0" width="26" height="26" fill="#1d3050"/><text x="40" y="17" fill="#bcd3f3">T</text>
    <rect x="54" y="0" width="26" height="26" fill="#1d3050"/><text x="67" y="17" fill="#bcd3f3">TR</text>
    <rect x="0" y="27" width="26" height="26" fill="#1d3050"/><text x="13" y="44" fill="#bcd3f3">L</text>
    <rect x="27" y="27" width="26" height="26" fill="#26456f"/><text x="40" y="44" fill="#dce8fb">C</text>
    <rect x="54" y="27" width="26" height="26" fill="#1d3050"/><text x="67" y="44" fill="#bcd3f3">R</text>
    <rect x="0" y="54" width="26" height="26" fill="#1d3050"/><text x="13" y="71" fill="#bcd3f3">BL</text>
    <rect x="27" y="54" width="26" height="26" fill="#1d3050"/><text x="40" y="71" fill="#bcd3f3">B</text>
    <rect x="54" y="54" width="26" height="26" fill="#1d3050"/><text x="67" y="71" fill="#bcd3f3">BR</text>
  </g>
  <text x="516" y="252" fill="#a9e0c2" font-size="12" font-weight="700">best: rectangles</text>
  <text x="516" y="270" fill="#79b196" font-size="11.5">UI panels, ledges,</text>
  <text x="516" y="285" fill="#79b196" font-size="11.5">building walls</text>
  <text x="516" y="308" fill="#d99" font-size="11.5">limit: rectangles only —</text>
  <text x="516" y="323" fill="#c88" font-size="11.5">no islands / bends / diagonals</text>

  <!-- ===== Wang 16 ===== -->
  <rect x="730" y="84" width="230" height="250" rx="8" fill="#11151d" stroke="#2a3240"/>
  <text x="746" y="110" fill="#bcd3f3" font-size="16" font-weight="700">Wang 16</text>
  <text x="746" y="128" fill="#e6c87a" font-size="12">16 tiles · the 4 corners</text>
  <g transform="translate(746,140)">
    <rect x="0" y="0" width="80" height="80" rx="4" fill="#3a2f1d" stroke="#5a4a2a"/>
    <circle cx="10" cy="10" r="6" fill="#ebd28c"/><circle cx="70" cy="10" r="6" fill="#ebd28c"/>
    <circle cx="10" cy="70" r="6" fill="#ebd28c"/><circle cx="70" cy="70" r="6" fill="#1a1e28" stroke="#5a4a2a"/>
    <text x="40" y="46" fill="#9fb0cc" font-size="11" text-anchor="middle">corner</text>
    <text x="40" y="60" fill="#9fb0cc" font-size="11" text-anchor="middle">bits</text>
  </g>
  <text x="746" y="252" fill="#a9e0c2" font-size="12" font-weight="700">best: paths &amp; blends</text>
  <text x="746" y="270" fill="#79b196" font-size="11.5">roads, rivers,</text>
  <text x="746" y="285" fill="#79b196" font-size="11.5">coastlines</text>
  <text x="746" y="308" fill="#d99" font-size="11.5">limit: corner-matched art,</text>
  <text x="746" y="323" fill="#c88" font-size="11.5">cardinal edges less crisp</text>
</svg>
