<svg width="940" height="430" viewBox="0 0 940 430" xmlns="http://www.w3.org/2000/svg" font-family="'DejaVu Sans','Segoe UI',sans-serif">
  <rect width="940" height="430" rx="14" fill="#0e1018"/>
  <text x="40" y="46" fill="#ebd28c" font-size="22" font-weight="700">Coordinate systems</text>
  <!-- 3D world -->
  <text x="60" y="92" fill="#9ec2f0" font-size="15" font-weight="700">3D world (right-handed)</text>
  <g stroke-width="3" fill="none">
    <line x1="150" y1="320" x2="150" y2="150" stroke="#7fd49a" marker-end="url(#g)"/>
    <line x1="150" y1="320" x2="330" y2="320" stroke="#e88a8a" marker-end="url(#r)"/>
    <line x1="150" y1="320" x2="265" y2="235" stroke="#7ab4eb" marker-end="url(#b)"/>
  </g>
  <defs>
    <marker id="g" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto"><path d="M0,0 L8,5 L0,10z" fill="#7fd49a"/></marker>
    <marker id="r" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto"><path d="M0,0 L8,5 L0,10z" fill="#e88a8a"/></marker>
    <marker id="b" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto"><path d="M0,0 L8,5 L0,10z" fill="#7ab4eb"/></marker>
  </defs>
  <circle cx="150" cy="320" r="4" fill="#d7dded"/>
  <text x="120" y="345" fill="#9aa3b6" font-size="13">origin (0,0,0)</text>
  <text x="160" y="145" fill="#7fd49a" font-size="15" font-weight="700">+Y  up</text>
  <text x="338" y="325" fill="#e88a8a" font-size="15" font-weight="700">+X  right</text>
  <text x="270" y="232" fill="#7ab4eb" font-size="15" font-weight="700">+Z  forward</text>
  <text x="60" y="392" fill="#6f7c95" font-size="13">the camera looks along +Z; object positions are RELATIVE to the camera</text>
  <!-- 2D screen -->
  <text x="560" y="92" fill="#9ec2f0" font-size="15" font-weight="700">2D screen / framebuffer</text>
  <rect x="600" y="116" width="220" height="220" fill="#141821" stroke="#46535f" stroke-width="1.5"/>
  <g stroke="#e0b86a" stroke-width="2.5" fill="none">
    <line x1="600" y1="116" x2="812" y2="116" marker-end="url(#y)"/>
    <line x1="600" y1="116" x2="600" y2="328" marker-end="url(#y)"/>
  </g>
  <defs><marker id="y" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto"><path d="M0,0 L8,5 L0,10z" fill="#e0b86a"/></marker></defs>
  <circle cx="600" cy="116" r="4" fill="#e0b86a"/>
  <text x="606" y="134" fill="#cdb985" font-size="13">(0,0)</text>
  <text x="824" y="120" fill="#e0b86a" font-size="14" font-weight="700">+x</text>
  <text x="606" y="346" fill="#e0b86a" font-size="14" font-weight="700">+y</text>
  <text x="724" y="350" fill="#9aa3b6" font-size="13" text-anchor="middle">(127,127)</text>
  <text x="710" y="232" fill="#6f7c95" font-size="14" text-anchor="middle">128 × 128</text>
  <text x="710" y="250" fill="#6f7c95" font-size="14" text-anchor="middle">RGB565</text>
</svg>
