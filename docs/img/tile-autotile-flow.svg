<svg width="1000" height="280" viewBox="0 0 1000 280" xmlns="http://www.w3.org/2000/svg" font-family="'DejaVu Sans','Segoe UI',sans-serif">
  <rect width="1000" height="280" rx="14" fill="#0e1018"/>
  <text x="40" y="42" fill="#ebd28c" font-size="22" font-weight="700">How a tile is chosen — per cell, every frame</text>
  <text x="40" y="66" fill="#9aa3b6" font-size="14">no resolved buffer: the only stored data is the logical map, so runtime digging / growth re-tiles instantly</text>

  <!-- Step 1: neighbours -->
  <text x="60" y="104" fill="#bcd3f3" font-size="13" font-weight="700">1 · the 8 neighbours</text>
  <g>
    <rect x="60" y="116" width="36" height="36" rx="3" fill="#2f6f4e"/><text x="78" y="139" fill="#0e1018" font-size="11" text-anchor="middle">NW</text>
    <rect x="98" y="116" width="36" height="36" rx="3" fill="#2f6f4e"/><text x="116" y="139" fill="#0e1018" font-size="12" text-anchor="middle">N</text>
    <rect x="136" y="116" width="36" height="36" rx="3" fill="#1a1e28" stroke="#2a3240"/><text x="154" y="139" fill="#6b7790" font-size="11" text-anchor="middle">NE</text>
    <rect x="60" y="154" width="36" height="36" rx="3" fill="#2f6f4e"/><text x="78" y="177" fill="#0e1018" font-size="12" text-anchor="middle">W</text>
    <rect x="98" y="154" width="36" height="36" rx="3" fill="#ebd28c" stroke="#fff2c8" stroke-width="2"/><text x="116" y="178" fill="#0e1018" font-size="16" text-anchor="middle" font-weight="700">▣</text>
    <rect x="136" y="154" width="36" height="36" rx="3" fill="#2f6f4e"/><text x="154" y="177" fill="#0e1018" font-size="12" text-anchor="middle">E</text>
    <rect x="60" y="192" width="36" height="36" rx="3" fill="#2f6f4e"/><text x="78" y="215" fill="#0e1018" font-size="11" text-anchor="middle">SW</text>
    <rect x="98" y="192" width="36" height="36" rx="3" fill="#2f6f4e"/><text x="116" y="215" fill="#0e1018" font-size="12" text-anchor="middle">S</text>
    <rect x="136" y="192" width="36" height="36" rx="3" fill="#2f6f4e"/><text x="154" y="215" fill="#0e1018" font-size="11" text-anchor="middle">SE</text>
  </g>
  <text x="60" y="248" fill="#79b196" font-size="11.5">green = same layer · grey = empty</text>

  <path d="M196 173 l34 0 m-10 -8 l10 8 -10 8" fill="none" stroke="#5a6678" stroke-width="2"/>

  <!-- Step 2: mask -->
  <text x="248" y="104" fill="#bcd3f3" font-size="13" font-weight="700">2 · build an 8-bit mask</text>
  <rect x="248" y="120" width="300" height="74" rx="6" fill="#11151d" stroke="#2a3240"/>
  <g font-family="monospace" font-size="13">
    <text x="264" y="146" fill="#9fb0cc">bit  N NE  E SE  S SW  W NW</text>
    <text x="264" y="168" fill="#a9e0c2">      1  0  1  1  1  1  1  1   = 0xF5</text>
  </g>
  <text x="264" y="186" fill="#7e93b4" font-size="11">off-map neighbours use edge_is_solid</text>

  <path d="M404 200 l0 18 m-8 -10 l8 10 8 -10" fill="none" stroke="#5a6678" stroke-width="2"/>

  <!-- Step 3: LUT -->
  <text x="600" y="104" fill="#bcd3f3" font-size="13" font-weight="700">3 · the rule type's LUT maps it</text>
  <rect x="600" y="120" width="340" height="74" rx="6" fill="#11151d" stroke="#2a3240"/>
  <g font-family="monospace" font-size="14">
    <text x="618" y="152" fill="#e6c87a">cell = lut[0xF5]</text>
    <text x="618" y="174" fill="#9fb0cc">     + variant + transform</text>
  </g>

  <path d="M770 207 l0 14 m-150 0 l300 0 m-150 -14 l0 14" fill="none" stroke="#5a6678" stroke-width="1.5"/>
  <text x="600" y="244" fill="#a9e0c2" font-size="13" font-weight="700">4 · blit that atlas cell to the screen</text>
</svg>
